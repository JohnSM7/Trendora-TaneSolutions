project_id = "trendora"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000/app"
additional_redirect_urls = [
  "http://localhost:3000",
  "http://localhost:3000/app",
  "http://localhost:3000/app/auth/callback",
  "http://localhost:4321",
  "https://trendora.tanesolutions.com",
  "https://trendora.tanesolutions.com/app",
  "https://trendora.tanesolutions.com/app/auth/callback"
]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.brand-assets]
public = false
file_size_limit = "20MiB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp", "image/svg+xml", "video/mp4"]

[edge_runtime]
enabled = true
