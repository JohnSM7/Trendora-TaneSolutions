version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: 'development'
        update-types: ['minor', 'patch']
      ai-providers:
        patterns:
          - '@ai-sdk/*'
          - 'ai'
          - '@anthropic-ai/sdk'
          - 'openai'
          - 'replicate'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
